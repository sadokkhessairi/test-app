name: CI - Frontend

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'frontend/**'

env:
  REGISTRY: ghcr.io

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build check
        run: |
          cd frontend
          npm run build

  build-scan-push-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build frontend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository }}/frontend:latest \
            ./frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository }}/frontend:latest

      - name: Update frontend manifest in infra repo
        run: |
          git clone https://x-access-token:${{ secrets.MANIFESTS_TOKEN }}@github.com/sadokkhessairi/k3s-infra.git
          cd k3s-infra/manifests/test-app
          sed -i "s|image: ghcr.io/.*/frontend:.*|image: ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}|" frontend-deployment.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add frontend-deployment.yaml
          git commit -m "ci: update frontend image to ${{ steps.version.outputs.VERSION }}"
          git push
